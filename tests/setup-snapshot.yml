---
# SPDX-License-Identifier: GPL-3.0-only

- name: Setup snapshot
  hosts: all
  vars:
    __snapshot_gather_vars: true
  tasks:
    - name: Set platform/version specific variables
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        __sr_public: true
    - name: Install test packages
      package:
        # not really invalid - see https://github.com/ansible/ansible-lint/issues/4702
        # noqa jinja[invalid]
        name: "{{ __base_packages + ['lsof', 'openssl'] }}"
        state: present
      vars:
        __varnames: "{{ lookup('varnames', '^__rsyslog_.*packages$',
                        wantlist=True) }}"
        __base_packages: "{{ lookup('vars', *__varnames, wantlist=True) |
          flatten | unique | sort }}"
